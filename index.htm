<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>aurastudio</title>



  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#630404;
      color:#333;
    }

    /* ENCABEZADO */
    header{
      background:white;
      padding:5px 5px;
      text-align:center;
      box-shadow:0 1px 5px rgba(0,0,0,0.1);
    }

    .logo{
      width:200px;
      max-width:50px%;
    }

    h1{
      margin-top:5px;
      font-size:30px;
      color:#444;
    }

    /* CATALOGO */
    .catalogo{
      width:90%;
      margin:40px auto;
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:25px;
    }

    .producto{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .producto:hover{
      transform:translateY(-5px);
    }

    .producto img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .info{
      padding:15px;
      text-align:center;
    }

    .info h2{
      font-size:18px;
      margin-bottom:10px;
    }

    .precio{
      color:#c59b6d;
      font-size:20px;
      font-weight:bold;
    }

    /* RESPONSIVE */
    @media(max-width:1000px){
      .catalogo{
        grid-template-columns:repeat(3, 1fr);
      }
    }

    @media(max-width:700px){
      .catalogo{
        grid-template-columns:repeat(2, 1fr);
      }
    }

    @media(max-width:500px){
      .catalogo{
        grid-template-columns:1fr;
      }
    }

  </style>
</head>
